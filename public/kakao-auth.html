<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>카카오톡 알림 권한 설정</title>
    <style>
        body { font-family: 'Arial', sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; background: #f8f9fa; }
        .container { text-align: center; background: white; padding: 40px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        h2 { margin-bottom: 20px; color: #333; }
        p { color: #666; margin-bottom: 30px; }
        .kakao-btn {
            background: #FEE500; color: #000000 85%; border: none; padding: 15px 30px;
            border-radius: 8px; font-weight: bold; font-size: 16px; cursor: pointer; text-decoration: none;
        }
        .kakao-btn:hover { background: #fdd835; }
    </style>
</head>
<body>
    <div class="container">
        <h2>🔔 카카오톡 알림 권한 설정</h2>
        <p>매일 오전 11시, 매출/예상 순익 알림을 받으려면<br>아래 버튼을 눌러 로그인을 완료해주세요.</p>

        <a id="loginBtn" href="#" class="kakao-btn">카카오 로그인하고 권한 주기</a>
    </div>

    <script>
        // 서버에서 인증 URL을 받아와서 하드코딩 제거
        fetch('/api/kakao/auth-url')
            .then(r => r.json())
            .then(data => {
                if (data.success) {
                    document.getElementById('loginBtn').href = data.url;
                }
            })
            .catch(e => console.error('인증 URL 로드 실패:', e));
    </script>
</body>
</html>
